training_params:
  max_train_examples: 8000
  max_eval_examples: 500
  num_train_epochs: 3
  train_batch_size: 4
  eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  weight_decay: 0.01
  warmup_steps: 100

generation_params:
  max_new_tokens: 60
  temperature: 0.8
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.3
  no_repeat_ngram_size: 3
